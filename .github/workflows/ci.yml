name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OUTPUT_DIR: "data/out"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Run linters
        run: uv run ruff check . && uv run ruff format --check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Run pytest
        run: uv run pytest

  build:
    name: Build Release
    needs:
      - lint
      - tests
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release-vars.outputs.release_tag }}
      release_major: ${{ steps.release-vars.outputs.release_major }}
      release_date: ${{ steps.release-vars.outputs.release_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --locked

      - name: Compute cache vars
        id: cache-vars
        run: |
          set -euo pipefail
          echo "cache_month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
          echo "uv_version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Cache metadata
        uses: actions/cache@v5
        with:
          path: data/meta
          key: meta-${{ steps.cache-vars.outputs.uv_version }}-${{ steps.cache-vars.outputs.cache_month }}
          restore-keys: |
            meta-${{ steps.cache-vars.outputs.uv_version }}-

      - name: Compute release vars
        id: release-vars
        run: |
          set -euo pipefail
          uv_version="${{ steps.cache-vars.outputs.uv_version }}"
          major="${uv_version%%.*}"
          echo "release_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "release_major=v$major" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$major" >> "$GITHUB_OUTPUT"

      - name: Build mappings
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TVDB_API_KEY: ${{ secrets.TVDB_API_KEY }}
        run: |
          set -euo pipefail
          uv run ./main.py --out "$OUTPUT_DIR" --compress --stats --provenance

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: data-out
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error

      - name: Write workflow summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Mapping build summary"
            echo ""
            echo "### stats"
            if [ -f "$OUTPUT_DIR/stats.md" ]; then
              cat "$OUTPUT_DIR/stats.md"
            else
              echo "stats.md not found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  diff:
    name: Diff Release
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: data-out
          path: /tmp/artifact

      - name: Download previous mappings.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/prev-release
          mkdir -p /tmp/prev-release
          gh release download "${{ needs.build.outputs.release_tag }}" --repo "${GITHUB_REPOSITORY}" -p "mappings.json" -D /tmp/prev-release || true

      - name: Compute mappings diff
        run: |
          set -euo pipefail
          old_file="/tmp/prev-release/mappings.json"
          new_file="/tmp/artifact/mappings.json"
          diff_file="/tmp/mappings.diff"

          if [ ! -f "$new_file" ]; then
            echo "Current mappings.json not found at $new_file"
            exit 1
          fi

          if [ ! -f "$old_file" ]; then
            echo "No previous mappings.json found for ${{ needs.build.outputs.release_tag }}"
            : > "$diff_file"
            exit 0
          fi

          diff -u --color=auto "$old_file" "$new_file" | tee "$diff_file" || true

      - name: Upload mappings diff artifact
        uses: actions/upload-artifact@v6
        with:
          name: mappings-diff
          path: /tmp/mappings.diff
          if-no-files-found: error

  publish:
    name: Publish Release
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: data-out
          path: /tmp/artifact

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          out_dir="/tmp/artifact"
          if [ ! -d "$out_dir" ]; then
            echo "Missing artifact output dir: $out_dir" >&2
            exit 1
          fi

          rm -rf /tmp/release-assets
          mkdir -p /tmp/release-assets

          shopt -s nullglob
          while IFS= read -r -d '' file; do
            rel="${file#"$out_dir/"}"
            asset_name="${rel//\//__}"
            cp "$file" "/tmp/release-assets/$asset_name"
          done < <(find "$out_dir" -type f -print0)

          if [ -z "$(ls -A /tmp/release-assets)" ]; then
            echo "No files found in $out_dir" >&2
            exit 1
          fi

      - name: Build release notes from stats
        shell: bash
        run: |
          set -euo pipefail
          stats_md="/tmp/artifact/stats.md"
          release_notes="/tmp/release-body.md"

          {
            echo "Automated rolling mappings build for major version ${{ needs.build.outputs.release_major }}."
            echo ""
            echo "Last updated: ${{ needs.build.outputs.release_date }}."
            echo ""
            if [ -f "$stats_md" ]; then
              cat "$stats_md"
            else
              echo "stats.md not found in release artifacts."
            fi
          } > "$release_notes"

      - name: Create or update major release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Mappings ${{ needs.build.outputs.release_major }} ${{ needs.build.outputs.release_date }}
          body_path: /tmp/release-body.md
          files: /tmp/release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
