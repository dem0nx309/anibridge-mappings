name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OUTPUT_DIR: "data/out"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Run linters
        run: uv run ruff check . && uv run ruff format --check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Run pytest
        run: uv run pytest

  build:
    name: Build Release
    if: ${{ secrets.TMDB_API_KEY != '' && secrets.TVDB_API_KEY != '' }}
    needs:
      - lint
      - tests
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
      actions: write
    outputs:
      release_tag: ${{ steps.release-vars.outputs.release_tag }}
      release_major: ${{ steps.release-vars.outputs.release_major }}
      release_date: ${{ steps.release-vars.outputs.release_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --locked

      - name: Compute cache vars
        id: cache-vars
        run: |
          set -euo pipefail
          uv_version="$(uv version --short)"
          cache_week="$(date -u +%G-W%V)"
          cache_prefix="meta-${uv_version}-${cache_week}-"
          cache_key="${cache_prefix}${GITHUB_RUN_ID}"

          echo "uv_version=$uv_version" >> "$GITHUB_OUTPUT"
          echo "cache_week=$cache_week" >> "$GITHUB_OUTPUT"
          echo "cache_prefix=$cache_prefix" >> "$GITHUB_OUTPUT"
          echo "cache_key=$cache_key" >> "$GITHUB_OUTPUT"

      - name: Restore metadata cache
        uses: actions/cache/restore@v4
        with:
          path: data/meta
          key: ${{ steps.cache-vars.outputs.cache_key }}
          restore-keys: |
            ${{ steps.cache-vars.outputs.cache_prefix }}

      - name: Compute release vars
        id: release-vars
        run: |
          set -euo pipefail
          uv_version="${{ steps.cache-vars.outputs.uv_version }}"
          major="${uv_version%%.*}"
          echo "release_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "release_major=v$major" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$major" >> "$GITHUB_OUTPUT"

      - name: Build mappings
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TVDB_API_KEY: ${{ secrets.TVDB_API_KEY }}
        run: |
          set -euo pipefail
          uv run ./main.py --out "$OUTPUT_DIR" --compress --stats --provenance

      - name: Save metadata cache
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/cache/save@v4
        with:
          path: data/meta
          key: ${{ steps.cache-vars.outputs.cache_key }}

      - name: Clean up old monthly caches
        if: ${{ github.event_name != 'pull_request' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PREFIX: ${{ steps.cache-vars.outputs.cache_prefix }}
          KEEP_KEY: ${{ steps.cache-vars.outputs.cache_key }}
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/caches?per_page=100&key=${PREFIX}" \
          | jq -r --arg KEEP_KEY "$KEEP_KEY" '
              .actions_caches
              | sort_by(.last_accessed_at, .created_at)
              | reverse
              | map(select(.key != $KEEP_KEY))
              | .[].id
            ' \
          | while read -r cache_id; do
              [ -n "$cache_id" ] || continue
              echo "Deleting old cache id=$cache_id"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/actions/caches/${cache_id}" || true
            done

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: data-out
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error

      - name: Write workflow summary
        if: always()
        run: |
          set -euo pipefail
          {
            if [ -f "$OUTPUT_DIR/stats.md" ]; then
              cat "$OUTPUT_DIR/stats.md"
            else
              echo "stats.md not found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  diff:
    name: Diff Release
    if: ${{ secrets.TMDB_API_KEY != '' && secrets.TVDB_API_KEY != '' }}
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: data-out
          path: /tmp/artifact

      - name: Download previous mappings.json
        run: |
          set -euo pipefail
          rm -rf /tmp/prev-release
          mkdir -p /tmp/prev-release

          old_file="/tmp/prev-release/mappings.json"
          temp_file="${old_file}.tmp"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ needs.build.outputs.release_tag }}/mappings.json"

          http_code="$(curl \
            --silent \
            --show-error \
            --location \
            --retry 5 \
            --retry-all-errors \
            --output "$temp_file" \
            --write-out '%{http_code}' \
            "$asset_url")"

          if [ "$http_code" = "200" ]; then
            mv "$temp_file" "$old_file"
            exit 0
          fi

          rm -f "$temp_file"

          if [ "$http_code" = "404" ]; then
            exit 0
          fi

          echo "Failed to download previous mappings.json from $asset_url (HTTP $http_code)" >&2
          exit 1

      - name: Compute mappings diff
        run: |
          set -euo pipefail
          old_file="/tmp/prev-release/mappings.json"
          new_file="/tmp/artifact/mappings.json"
          diff_file="/tmp/mappings.diff"

          if [ ! -f "$new_file" ]; then
            echo "Current mappings.json not found at $new_file"
            exit 1
          fi

          if [ ! -f "$old_file" ]; then
            echo "No previous mappings.json found for ${{ needs.build.outputs.release_tag }}"
            : > "$diff_file"
            exit 0
          fi

          diff -u --color=auto "$old_file" "$new_file" | tee "$diff_file" || true

      - name: Upload mappings diff artifact
        uses: actions/upload-artifact@v6
        with:
          name: mappings-diff
          path: /tmp/mappings.diff
          if-no-files-found: error

  publish:
    name: Publish Release
    if: ${{ github.event_name != 'pull_request' && secrets.TMDB_API_KEY != '' && secrets.TVDB_API_KEY != '' }}
    needs:
      - build
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: data-out
          path: /tmp/artifact

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          out_dir="/tmp/artifact"
          if [ ! -d "$out_dir" ]; then
            echo "Missing artifact output dir: $out_dir" >&2
            exit 1
          fi

          rm -rf /tmp/release-assets
          mkdir -p /tmp/release-assets

          shopt -s nullglob
          while IFS= read -r -d '' file; do
            rel="${file#"$out_dir/"}"
            asset_name="${rel//\//__}"
            cp "$file" "/tmp/release-assets/$asset_name"
          done < <(find "$out_dir" -type f -print0)

          if [ -z "$(ls -A /tmp/release-assets)" ]; then
            echo "No files found in $out_dir" >&2
            exit 1
          fi

      - name: Build release notes from stats
        shell: bash
        run: |
          set -euo pipefail
          stats_md="/tmp/artifact/stats.md"
          release_notes="/tmp/release-body.md"

          {
            echo "Automated rolling mappings build for major version ${{ needs.build.outputs.release_major }}."
            echo ""
            echo "Last updated: ${{ needs.build.outputs.release_date }}."
            echo ""
            if [ -f "$stats_md" ]; then
              cat "$stats_md"
            else
              echo "stats.md not found in release artifacts."
            fi
          } > "$release_notes"

      - name: Create or update major release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Mappings ${{ needs.build.outputs.release_major }} ${{ needs.build.outputs.release_date }}
          body_path: /tmp/release-body.md
          files: /tmp/release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  release-prereqs:
    name: Release Prerequisites
    if: ${{ secrets.TMDB_API_KEY == '' || secrets.TVDB_API_KEY == '' }}
    needs:
      - lint
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Explain why release jobs were skipped
        run: |
          {
            echo "## Release jobs skipped"
            echo ""
            echo "The fork is healthy for linting and tests, but release generation requires repository secrets."
            echo ""
            echo "Missing required secrets:"
            [ -n "${{ secrets.TMDB_API_KEY }}" ] || echo "- TMDB_API_KEY"
            [ -n "${{ secrets.TVDB_API_KEY }}" ] || echo "- TVDB_API_KEY"
            echo ""
            echo "Add the missing secrets in:"
            echo "Settings > Secrets and variables > Actions"
          } >> "$GITHUB_STEP_SUMMARY"
